<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>baegopa</title>
    <script
      type="text/javascript"
      src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=mwakhg8f98&submodules=geocoder"
    ></script>
    <link rel="icon" href="/assets/paypal.svg" />
    <link href="./css/map.css" rel="stylesheet" />
  </head>
  <body>
    <div class="map-wrap">
      <form id="map-search-form" class="toolbar" autocomplete="off">
        <input
          id="q"
          type="text"
          placeholder="식당명, 카테고리, 주소 검색"
        />
        <button id="btnSearch" type="submit">검색</button>
        <button id="btnHome" type="button">홈</button>
      </form>
      <div id="map"></div>
      <div id="map-search-notice" class="map-search-notice hidden"></div>
      <button
        id="btnMyLocation"
        class="my-location-btn"
        type="button"
        aria-label="내 위치로 이동"
        title="내 위치"
      >
        <svg
          class="my-location-icon"
          aria-hidden="true"
          viewBox="0 0 24 24"
          focusable="false"
        >
          <path
            d="M12 3.75 19.25 20.25 12 16.75 4.75 20.25 12 3.75Z"
            fill="currentColor"
          />
        </svg>
      </button>
      <button id="btn-search-area" class="search-area-btn hidden" type="button">
        이 지역에서 다시 검색
      </button>
      <div
        id="restaurant-card"
        class="restaurant-card hidden"
        aria-live="polite"
      >
        <div class="restaurant-card-header">
          <div>
            <div
              id="restaurant-card-category"
              class="restaurant-card-category"
            ></div>
            <div id="restaurant-card-name" class="restaurant-card-name"></div>
          </div>
          <button
            id="restaurant-card-close"
            class="restaurant-card-close"
            type="button"
            aria-label="닫기"
          >
            닫기
          </button>
        </div>
        <div id="restaurant-card-meta" class="restaurant-card-meta"></div>
        <div id="restaurant-card-address" class="restaurant-card-address"></div>
        <button id="restaurant-card-detail" class="btn btn-primary" type="button">
          상세보기
        </button>
      </div>
      <div id="confirm-panel" class="confirm-panel hidden" aria-live="polite">
        <div class="cp-body">
          <div class="cp-title">이 위치를 현재 위치로 지정할까요?</div>
          <div id="cp-address" class="cp-sub">좌표 불러오는 중...</div>
          <div class="cp-actions">
            <button id="cp-cancel" class="btn btn-outline">취소</button>
            <button id="cp-confirm" class="btn btn-primary">
              현재 위치로 지정
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./js/map.js"></script>
  </body>
</html>
