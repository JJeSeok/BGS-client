<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · 관리자 콘솔</title>

    <link rel="icon" href="/assets/paypal.svg" />
    <link href="/assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <link href="css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <div class="admin-wrap">
      <div class="admin-header">
        <div>
          <h3 class="mb-1">관리자 콘솔</h3>
          <div class="muted admin-subtitle">
            식당 등록 요청과 리뷰를 관리할 수 있어요.
          </div>
        </div>
        <div class="admin-header-actions">
          <a class="btn btn-outline-secondary" href="/">홈</a>
          <a class="btn btn-outline-secondary" href="/mypage.html">마이페이지</a>
        </div>
      </div>

      <div id="toastZone" class="mb-3"></div>

      <ul class="nav nav-tabs admin-tabs" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="requests-tab"
            data-bs-toggle="tab"
            data-bs-target="#requestsPanel"
            type="button"
            role="tab"
            aria-controls="requestsPanel"
            aria-selected="true"
          >
            식당 등록 요청
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="reviews-tab"
            data-bs-toggle="tab"
            data-bs-target="#reviewsPanel"
            type="button"
            role="tab"
            aria-controls="reviewsPanel"
            aria-selected="false"
          >
            리뷰 관리
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="users-tab"
            data-bs-toggle="tab"
            data-bs-target="#usersPanel"
            type="button"
            role="tab"
            aria-controls="usersPanel"
            aria-selected="false"
          >
            사용자 관리
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <section
          class="tab-pane fade show active"
          id="requestsPanel"
          role="tabpanel"
          aria-labelledby="requests-tab"
        >
          <div class="card mb-3">
            <div class="card-body admin-control-bar">
              <div class="admin-field-inline">
                <label for="requestStatusSelect" class="form-label mb-0">
                  상태
                </label>
                <select
                  id="requestStatusSelect"
                  class="form-select form-select-sm admin-select"
                >
                  <option value="pending">pending (기본)</option>
                  <option value="approved">approved</option>
                  <option value="rejected">rejected</option>
                </select>
              </div>

              <button id="requestReloadBtn" class="btn btn-sm btn-primary">
                새로고침
              </button>

              <div class="admin-control-note">
                ※ 승인/반려는 pending에서만 가능합니다.
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div
                id="requestEmpty"
                class="muted admin-empty"
                style="display: none"
              >
                요청이 없습니다.
              </div>

              <div class="table-responsive">
                <table class="table align-middle admin-table">
                  <thead>
                    <tr>
                      <th class="td-tight">ID</th>
                      <th>식당</th>
                      <th>지역</th>
                      <th class="td-tight">요청자</th>
                      <th class="td-tight">요청일</th>
                      <th class="td-tight">상태</th>
                      <th class="td-tight">처리</th>
                    </tr>
                  </thead>
                  <tbody id="requestTbody"></tbody>
                </table>
              </div>

              <div
                id="requestLoadMoreWrap"
                class="admin-load-more"
                style="display: none"
              >
                <button
                  id="requestLoadMoreBtn"
                  type="button"
                  class="btn btn-outline-secondary btn-sm"
                >
                  더보기
                </button>
              </div>
            </div>
          </div>
        </section>

        <section
          class="tab-pane fade"
          id="reviewsPanel"
          role="tabpanel"
          aria-labelledby="reviews-tab"
        >
          <div class="card mb-3">
            <div class="card-body admin-control-bar">
              <form id="reviewSearchForm" class="admin-search-form">
                <label for="reviewSearchInput" class="visually-hidden">
                  리뷰 검색
                </label>
                <input
                  id="reviewSearchInput"
                  class="form-control form-control-sm"
                  type="search"
                  placeholder="리뷰 내용, 식당명, 작성자 검색"
                  autocomplete="off"
                />
                <button class="btn btn-sm btn-primary" type="submit">
                  검색
                </button>
              </form>

              <button
                id="reviewReloadBtn"
                type="button"
                class="btn btn-sm btn-outline-secondary"
              >
                새로고침
              </button>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div
                id="reviewEmpty"
                class="muted admin-empty"
                style="display: none"
              >
                리뷰가 없습니다.
              </div>

              <div class="table-responsive">
                <table class="table align-middle admin-table review-table">
                  <thead>
                    <tr>
                      <th class="td-tight">ID</th>
                      <th>식당</th>
                      <th class="td-tight">작성자</th>
                      <th class="td-tight">평점</th>
                      <th>내용</th>
                      <th class="td-tight">이미지</th>
                      <th class="td-tight">반응</th>
                      <th class="td-tight">작성일</th>
                      <th class="td-tight">관리</th>
                    </tr>
                  </thead>
                  <tbody id="reviewTbody"></tbody>
                </table>
              </div>

              <div
                id="reviewLoadMoreWrap"
                class="admin-load-more"
                style="display: none"
              >
                <button
                  id="reviewLoadMoreBtn"
                  type="button"
                  class="btn btn-outline-secondary btn-sm"
                >
                  더보기
                </button>
              </div>
            </div>
          </div>
        </section>

        <section
          class="tab-pane fade"
          id="usersPanel"
          role="tabpanel"
          aria-labelledby="users-tab"
        >
          <div class="card">
            <div class="card-body admin-placeholder">
              <h5 class="mb-2">사용자 관리</h5>
              <p class="muted mb-0">사용자 관리 기능은 다음 단계에서 추가됩니다.</p>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script src="/assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
